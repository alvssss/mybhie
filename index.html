<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>INPUT HTML xd</title>
    <link rel="stylesheet" type="text/css" href="alv.css">
</head>
<body style="background-image: url(anime.eyes.jpg); background-color: cover ; background-repeat: no-repeat;">
    <form name="registration" method="post" action="#">
        <fieldset>
            <legend>JASON PERSONAL FORM</legend>
            <div class="form-group">
                <label for="fullname">Full name:</label>
                <input type="text" id="fullname" name="fullname" 
                placeholder="Last Name, Family Name, MI" required>
            </div>

      
            <div class="form-group">
                <label for="fullname">Email</label>
                <input type="email" id="useremail"
                 placeholder="@gmail.com"
                 >
            </div>

            <div class="form-group"></div>
                <label for="fullname">Password</label>
                <input type="password" id="password" name="password" 
                placeholder="up to 8 characters long">


            <label>Gender</label>
            <input type="radio" name="gender" id="male">
            <label for="male" class="radio_button">Male</label>

            <input type="radio" name="gender" id="female">
            <label for="female" class="radio_button">Female</label>

            <label>Birthdate</label>
            <input type="date" name="birthdate" class="date">

            <label>Age</label>
            <input type="number" name="age" min="1" max="110" class="age">

            <label>Choose your color</label>
            <input type="color" name="color" class="color">

            <label for="profile">Choose a Profile Pic</label>
            <input type="file" name="profile" id="profile">
            

        </fieldset>

                <fieldset>
                    <legend>Academics</legend>
                    <label>Year level</label>



                    <select name="year level">
                        <option>--Choose a year level--</option>
                        <option>1st</option>
                        <option>2nd</option>
                        <option>3rd</option>
                    </select>
                    <label>Bio</label>
                    <textarea rows="5" cols="50" placeholder="Please enter your student bio...">
                    </textarea>
                    
                    <label>Interest</label>
                    <input type="checkbox" id="swimming">
                    <label for="swimming" class="check_button">Swimming</label>

                    <input type="checkbox" id="mobile_gaming">
                    <label for="mobile_gaming" class="check_button" >Mobile Gaming</label>

                    <input type="checkbox" id="cleaning">
                    <label for="cleaning" class="check_button">Cleaning</label>

                    <div class="form-group"></div>
                
                <input type="submit" value="Register">
                <input type="reset" value="Clear">





                </fieldset>
    </form>




 
    
</body>
</html>
